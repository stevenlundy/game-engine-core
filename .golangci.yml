linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable-all: true
  gofmt:
    simplify: true
  staticcheck:
    checks: ["all"]

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - gofmt

run:
  timeout: 5m
  tests: true

issues:
  exclude-rules:
    # Ignore errors in test helper files
    - path: "_test\\.go"
      linters:
        - errcheck
